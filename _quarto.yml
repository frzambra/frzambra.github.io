project:
  type: website
  output-dir: docs
  render: 
    - "*.qmd"
    - "!tmp/"

website:
  title: "Francisco Zambrano"
  favicon: img/fzb_selfie.ico
  site-url: "https://francisco-zambrano.cl"
  open-graph: true
  navbar:
    background: "#234460"
    left:
      - text: "Research"
        menu: 
          - text: "Publications"
            href: publications.qmd
          - text: "Conferences"
            href: conferences.qmd
      - href: teaching.qmd
        text: Teaching
      - href: projects.qmd
        text: Projects
      - href: cv/index.html
        text: CV
      - href: posts.qmd
        text: Blog
      # - href: about.qmd
      #   text: About
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/frzambra/
      - icon: github
        href: https://www.github.com/frzambra
    

format:
  html:
    theme:
      - tango
      - rjh.scss
    css: styles.css
    toc: true
    mainfont: "Merriweather, Georgia, serif"
    html-math-method: katex
    include-in-header:
      file: header.html
    include-after-body:
      - text: |
          <script src="/language-toggle.js"></script>
          <script src="/card-collapse.js"></script>
